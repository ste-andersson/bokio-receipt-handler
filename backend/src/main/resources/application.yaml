spring:
  application:
    name: receipthandler
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CLERK_ISSUER_URI}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bokio_receipt_handler}
    username: ${DB_USERNAME:stefan}
    password: ${DB_PASSWORD:kvitto}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}

openai:
  api-key: ${OPENAI_API_KEY}

groq:
  api-key: ${GROQ_API_KEY}

grok:
  api-key: ${GROK_API_KEY}